<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 232" width="800" height="232" role="img" aria-label="Sleepless — keep your Mac awake with the lid closed">
  <title>Sleepless</title>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cf0"/>
      <stop offset="1" stop-color="#4f2fb0"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eae3ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#e3d6ff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#e3d6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="moonMask">
      <circle cx="116" cy="116" r="46" fill="#ffffff"/>
      <circle cx="142" cy="103" r="41" fill="#000000"/>
    </mask>
    <style>
      .halo  { animation: breathe 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .moon  { animation: glow 5s ease-in-out infinite; }
      .star  { animation: twinkle 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .s2 { animation-delay: .5s }  .s3 { animation-delay: 1.1s } .s4 { animation-delay: 1.7s }
      .s5 { animation-delay: 2.3s } .s6 { animation-delay: .9s }
      @keyframes breathe { 0%,100% { opacity:.55; transform:scale(.94) } 50% { opacity:1; transform:scale(1.06) } }
      @keyframes glow    { 0%,100% { opacity:.92 } 50% { opacity:1 } }
      @keyframes twinkle { 0%,100% { opacity:.25; transform:scale(.8) } 50% { opacity:1; transform:scale(1.1) } }
      @media (prefers-reduced-motion: reduce) {
        .halo,.moon,.star { animation: none }
      }
    </style>
  </defs>

  <!-- glass plate -->
  <rect x="2" y="2" width="796" height="228" rx="28" fill="url(#plate)"/>
  <rect x="2" y="2" width="796" height="114" rx="28" fill="url(#sheen)"/>
  <rect x="2.5" y="2.5" width="795" height="227" rx="27.5" fill="none" stroke="#ffffff" stroke-opacity="0.3"/>

  <!-- stars -->
  <circle class="star s1" cx="250" cy="54" r="2.6" fill="#ffffff"/>
  <circle class="star s2" cx="330" cy="40" r="2.0" fill="#f3eeff"/>
  <circle class="star s3" cx="612" cy="58" r="2.4" fill="#ffffff"/>
  <circle class="star s4" cx="700" cy="92" r="2.0" fill="#f3eeff"/>
  <circle class="star s5" cx="540" cy="44" r="1.8" fill="#ffffff"/>
  <circle class="star s6" cx="466" cy="30" r="1.6" fill="#ece3ff"/>

  <!-- moon: breathing halo + crescent -->
  <circle class="halo" cx="116" cy="113" r="78" fill="url(#halo)"/>
  <g class="moon" mask="url(#moonMask)">
    <rect x="64" y="60" width="116" height="116" fill="url(#moonGrad)"/>
  </g>

  <!-- wordmark -->
  <text x="206" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1.5">Sleepless</text>
  <text x="208" y="156" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#f0e9ff">Keep your Mac awake with the lid closed.</text>
  <text x="208" y="186" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#d6c9ff">On battery &#183; no external display &#183; auto-off at your battery floor</text>
</svg>
