name: Release

# Cut a release from a tag. Building on a GitHub-hosted runner, signing the build
# provenance with Sigstore (SLSA Build L2), and publishing the zip + checksums means
# anyone can verify the download came from this exact source, with no Apple account
# involved. See docs/AUDIT.md for how to verify as a user.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build a release for, e.g. v1.1.0'
        required: true

permissions:
  contents: write       # create the release + upload assets
  id-token: write       # Sigstore OIDC, required by attest-build-provenance
  attestations: write   # write the build-provenance attestation to this repo

jobs:
  release:
    name: Build, attest, and publish
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and version
        id: ver
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"    >> "$GITHUB_OUTPUT"

      - name: Toolchain
        run: |
          sw_vers
          swiftc --version
          echo "SDK: $(xcrun --sdk macosx --show-sdk-version 2>/dev/null || echo n/a)"

      - name: Build Sleepless Agents.app
        run: |
          set -euo pipefail
          # Conservative deployment target so it compiles against the runner SDK and
          # runs on macOS 13+. (Local + tested target is arm64-apple-macos26.0.)
          TARGET="arm64-apple-macos13.0" ./build.sh "$PWD/dist"
          codesign --verify --verbose=1 "dist/Sleepless Agents.app"

      - name: Zip the app bundle
        id: zip
        run: |
          set -euo pipefail
          ASSET="Sleepless-${{ steps.ver.outputs.version }}.zip"
          ditto -c -k --keepParent "dist/Sleepless Agents.app" "$ASSET"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          ls -la "$ASSET"

      - name: SHA-256 checksums
        run: |
          set -euo pipefail
          shasum -a 256 "${{ steps.zip.outputs.asset }}" | tee SHA256SUMS

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.zip.outputs.asset }}

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            /^## \[/ && flag {exit}
            flag {print}
          ' CHANGELOG.md > NOTES.md
          # Append verification footer.
          {
            echo ""
            echo "---"
            echo "### Verify this download"
            echo '```sh'
            echo "shasum -a 256 -c SHA256SUMS"
            echo "gh attestation verify ${{ steps.zip.outputs.asset }} -R ${{ github.repository }}"
            echo '```'
            echo "See [docs/AUDIT.md](https://github.com/${{ github.repository }}/blob/main/docs/AUDIT.md) for what each check proves."
          } >> NOTES.md
          echo "----- NOTES.md -----"; cat NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          ASSET="${{ steps.zip.outputs.asset }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" SHA256SUMS --clobber
            gh release edit "$TAG" --notes-file NOTES.md --title "Sleepless Agents ${{ steps.ver.outputs.version }}"
          else
            gh release create "$TAG" "$ASSET" SHA256SUMS \
              --title "Sleepless Agents ${{ steps.ver.outputs.version }}" \
              --notes-file NOTES.md
          fi
